[sms]
# Enable or disable SMS authentication
enabled = true

# Client secret for request signing (change this to a secure value)
client_secret = veda-sms-secret-key-2024-secure

# SMS code settings
code_length = 6
code_ttl = 300
max_attempts = 3

# Rate limiting
codes_per_phone_per_hour = 5
codes_per_ip_per_hour = 20


# Maximum time drift for request timestamps (seconds)
max_time_drift = 300

[sms_provider]
# SMS provider type
provider = megalabs

# Megalabs provider settings
server = https://a2p-api.mes.ru/sms/v1/sms
user = yyyyyyyy
password = xxxxxxxx
from = PKL
message_size_limit = 500
